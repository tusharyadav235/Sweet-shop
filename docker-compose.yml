version: '3.9'

services:
  backend:
    image: tusharyadaav/jiya-lal-halwai-backend:latest
    container_name: jiyalal-backend
    restart: always
    environment:
      SPRING_DATASOURCE_URL: ${DB_URL}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASS}
      JWT_SECRET: ${JWT_SECRET}
      SPRING_PROFILES_ACTIVE: prod
    volumes:
      - uploads_data:/app/uploads
    networks:
      - jiyalal-net
    expose:
      - "8080"

  frontend:
    image: tusharyadaav/jiya-lal-halwai-frontend:latest
    container_name: jiyalal-frontend
    restart: always
    depends_on:
      - backend
    networks:
      - jiyalal-net

  nginx:
    image: nginx:alpine
    container_name: jiyalal-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    networks:
      - jiyalal-net

volumes:
  uploads_data:

networks:
  jiyalal-net:
    driver: bridge