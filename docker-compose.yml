version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: jiyalal-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_URL: ${DB_URL}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    networks:
      - jiyalal-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: jiyalal-backend
    restart: always
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_URL: ${DB_URL}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      JWT_SECRET: ${JWT_SECRET}
      SPRING_PROFILES_ACTIVE: prod
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    networks:
      - jiyalal-net
    expose:
      - "8080"   # internal only (not public)

  frontend:
    build:
      context: ./frontend
    container_name: jiyalal-frontend
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - jiyalal-net

  nginx:
    image: nginx:alpine
    container_name: jiyalal-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    networks:
      - jiyalal-net

volumes:
  mysql_data:
  uploads_data:

networks:
  jiyalal-net:
    driver: bridge
